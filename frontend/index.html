    <!-- Styles -->
    <style>
        
        .pipeline-connector-active {
            background-image: linear-gradient(to right, #C4956A 50%, transparent 50%);
            background-size: 10px 2px;
            background-repeat: repeat-x;
            animation: move-bg 1s linear infinite;
        }
        @keyframes move-bg {
            0% { background-position: 0 0; }
            100% { background-position: 10px 0; }
        }
        
        body {
            background-color: #0A0A0A;
        }
        
        @keyframes pulse-gold {
          0% { box-shadow: 0 0 0 0 rgba(196, 149, 106, 0.4); }
          70% { box-shadow: 0 0 0 15px rgba(196, 149, 106, 0); }
          100% { box-shadow: 0 0 0 0 rgba(196, 149, 106, 0); }
        }

        @keyframes dash-move {
          to { stroke-dashoffset: -20; }
        }

        @keyframes scanline {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(100%); }
        }

        @keyframes typewriter {
          from { width: 0; }
          to { width: 100%; }
        }

        .active-step-ring {
          animation: pulse-gold 2s infinite;
        }

        .animated-connector {
          stroke-dasharray: 5, 5;
          animation: dash-move 1s linear infinite;
        }

        .terminal-scanline {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
          background-size: 100% 4px;
          pointer-events: none;
          z-index: 10;
        }

        .terminal-glow {
          animation: scanline 8s linear infinite;
          background: linear-gradient(to bottom, transparent, rgba(122, 201, 122, 0.05), transparent);
          height: 50px;
          width: 100%;
          position: absolute;
          z-index: 5;
        }
        
        .typewriter-text {
          display: inline-block;
          overflow: hidden;
          white-space: nowrap;
          animation: typewriter 2s steps(40, end);
        }
    

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #1F1F1F;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

<!-- Script for draggable resizer logic -->
<script>
        document.addEventListener('DOMContentLoaded', function() {
            const resizer = document.getElementById('resizer');
            const leftPanel = document.getElementById('left-panel');
            const container = document.getElementById('split-container');
            
            let isResizing = false;

            resizer.addEventListener('mousedown', function(e) {
                isResizing = true;
                resizer.classList.add('bg-plangen-gold/50');
                document.body.style.cursor = 'col-resize';
                // Prevent text selection while dragging
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                // Calculate new width percentage based on container width and mouse position
                const containerRect = container.getBoundingClientRect();
                let newWidthPct = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                
                // Enforce min (20%) and max (60%) constraints
                if (newWidthPct < 20) newWidthPct = 20;
                if (newWidthPct > 60) newWidthPct = 60;
                
                leftPanel.style.width = `${newWidthPct}%`;
            });

            document.addEventListener('mouseup', function(e) {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('bg-plangen-gold/50');
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = 'auto';
                }
            });
        });
    </script>
